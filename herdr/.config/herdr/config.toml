onboarding = false

[theme]
name = "terminal"

[theme.custom]
panel_bg = "darkgray"
surface_dim = "darkgray"
surface0 = "darkgray"
surface1 = "gray"
overlay0 = "white"
overlay1 = "cyan"
subtext0 = "white"
selected = "white"
accent = "cyan"
mauve = "cyan"
green = "green"
yellow = "yellow"
red = "red"
peach = "yellow"

[terminal]
new_cwd = "follow"

[keys]
prefix = "ctrl+space"

help = "prefix+?"
settings = "prefix+shift+s"
detach = "prefix+d"
reload_config = "prefix+shift+r"
open_notification_target = ""
edit_scrollback = "prefix+e"

workspace_picker = "prefix+w"
previous_workspace = "alt+k"
next_workspace = "alt+j"
new_workspace = "prefix+shift+c"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+q"

new_tab = "prefix+c"
rename_tab = "prefix+shift+t"
previous_tab = "alt+h"
next_tab = "alt+l"
switch_tab = "alt+1..9"
close_tab = "prefix+q"

focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
split_vertical = "prefix+v"
split_horizontal = "prefix+s"
close_pane = "prefix+x"
zoom = "prefix+f"
resize_mode = "prefix+r"

navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

[[keys.command]]
key = "prefix+t"
type = "pane"
command = "thud --mode=popup"

[[keys.command]]
key = "prefix+o"
type = "shell"
command = "$HOME/dotfiles/herdr/.local/bin/herdr-close-other-panes"

[ui]
mouse_capture = true
confirm_close = true
prompt_new_tab_name = false
accent = "cyan"

show_agent_labels_on_pane_borders = true

agent_panel_scope = "all"
[ui.toast]
delivery = "herdr"

[ui.sound]
enabled = true

[session]
resume_agents_on_restore = false
