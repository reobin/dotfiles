bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy cmd terminal cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy cmd terminal cwd)" tmux new

bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy launch browser
bindd = SUPER SHIFT ALT, RETURN, Browser (private), exec, omarchy launch browser --private

bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy cmd terminal cwd)"

bindd = SUPER SHIFT, D, Docker, exec, omarchy launch tui lazydocker
bindd = SUPER SHIFT, B, Bruno, exec, bruno

bindd = SUPER SHIFT, S, Slack, exec, [workspace 9 silent] slack
bindd = SUPER SHIFT, T, Telegram, exec, [workspace 8 silent] Telegram
bindd = SUPER SHIFT, W, WhatsApp, exec, [workspace 8 silent] omarchy launch or focus webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT, E, Email, exec, [workspace 10 silent] omarchy launch or focus webapp Email "https://mail.proton.me/u/1/inbox"
bindd = SUPER SHIFT, L, LocalSend, exec, uwsm-app -- localsend
bindd = SUPER SHIFT, O, OTP, exec, uwsm-app -- proton-authenticator

bindd = SUPER SHIFT, A, AI, exec, omarchy launch webapp "https://chatgpt.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy launch webapp "https://calendar.google.com/calendar/u/1/r?hl=en"
bindd = SUPER SHIFT, N, Notion, exec, uwsm-app -- notion-app
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

bindd = SUPER SHIFT, M, Music, exec, omarchy launch or focus spotify
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy launch or focus tui cliamp
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy launch webapp "https://youtube.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy launch webapp "https://x.com/"

bindd = SUPER CTRL, P, Screenshot, exec, omarchy screenshot
bindd = SUPER CTRL, X, Toggle dictation, exec, voxtype record toggle
bindd = SUPER SHIFT, R, Reload hyprland, exec, hyprctl reload
bindd = SUPER ALT, T, Thud, exec, ~/.config/hypr/scripts/thud-toggle

bindd = SUPER ALT, L, Toggle keyboard layout, exec, hyprctl switchxkblayout all next
