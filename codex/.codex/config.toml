# codex baseline: begin
# managed by dotfiles; keep personal project paths and generated state outside this block.
model = "gpt-5.5"
model_reasoning_effort = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[tui]
theme = "github"
status_line = ["model-with-reasoning", "used-tokens", "five-hour-limit", "weekly-limit"]
status_line_use_colors = true

[tui.keymap.chat]
decrease_reasoning_effort = "alt-["
increase_reasoning_effort = "alt-]"

[plugins."github@openai-curated"]
enabled = true

[features]
terminal_resize_reflow = true

[hooks]
SessionStart = [{ hooks = [{ type = "command", command = "thud-codex-status" }, { type = "command", command = "bash '/home/reobin/.codex/herdr-agent-state.sh' idle", timeout = 10 }] }]
UserPromptSubmit = [{ hooks = [{ type = "command", command = "thud-codex-status" }, { type = "command", command = "bash '/home/reobin/.codex/herdr-agent-state.sh' working", timeout = 10 }] }]
PreToolUse = [{ hooks = [{ type = "command", command = "thud-codex-status" }, { type = "command", command = "bash '/home/reobin/.codex/herdr-agent-state.sh' working", timeout = 10 }] }]
PermissionRequest = [{ hooks = [{ type = "command", command = "thud-codex-status" }, { type = "command", command = "bash '/home/reobin/.codex/herdr-agent-state.sh' blocked", timeout = 10 }] }]
PostToolUse = [{ hooks = [{ type = "command", command = "thud-codex-status" }] }]
Stop = [{ hooks = [{ type = "command", command = "thud-codex-status" }, { type = "command", command = "bash '/home/reobin/.codex/herdr-agent-state.sh' idle", timeout = 10 }] }]
# codex baseline: end
