# prefix
set -g prefix C-Space
bind C-Space send-prefix
unbind C-b

# Ensure pnpm global tools are available in tmux
run-shell 'tmux set-environment -g PATH "$HOME/.local/share/pnpm:$PATH"'

# reload config
bind e source-file ~/.config/tmux/tmux.conf

# vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# pane Controls
unbind f
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind f resize-pane -Z
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
unbind -T prefix Left
unbind -T prefix Down
unbind -T prefix Up
unbind -T prefix Right
bind x kill-pane
bind o kill-pane -a
unbind C-o

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5
bind H swap-pane -s '{left-of}'
bind J run-shell "thud jump"
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

# window navigation
bind c new-window -c "#{pane_current_path}"
bind q kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-h select-window -t -1
bind -n M-l select-window -t +1
bind -n M-H swap-window -t -1 \; select-window -t -1
bind -n M-L swap-window -t +1 \; select-window -t +1

# session controls
bind R rotate-window
bind C run-shell "$HOME/.config/tmux/tmux-new-alpha-session.sh '#{pane_current_path}'"
bind Q kill-session
bind P switch-client -p
bind N switch-client -n
bind -n M-k switch-client -p
bind -n M-j switch-client -n

# resize leader
bind r switch-client -T resize
bind -T resize h resize-pane -L 5
bind -T resize j resize-pane -D 5
bind -T resize k resize-pane -U 5
bind -T resize l resize-pane -R 5

# general
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on
set -g update-environment "DISPLAY WAYLAND_DISPLAY XDG_SESSION_TYPE XDG_CURRENT_DESKTOP SWAYSOCK SSH_AUTH_SOCK"
set -g allow-passthrough off
setw -g aggressive-resize on
set -s extended-keys on
set -as terminal-features 'ghostty:extkeys'
set -g detach-on-destroy off
set -g extended-keys-format csi-u

# thud popup toggle
bind t display-popup -E -w 90% -h 90% "thud --mode=popup"

# status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 80
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{pane_current_command}'


# theme
set -g status-style "bg=default,fg=default"
set -g @status-left-default "#[fg=brightblack,bg=default] #S "
set -g @status-left-termius "#[fg=brightblack,bg=default] #S "
set -g @status-copy-badge "#[fg=#1D211A,bg=#F7C775] SCROLL #[default]"
set -g @status-prefix-badge "#[fg=#1D211A,bg=#BCCD80] PREFIX #[default]"
set -g @status-zoom-badge "#[fg=#1D211A,bg=#7AA2F7] ZOOM #[default]"
set -g status-left "#{?#{&&:#{m:*xterm-256color*,#{client_termname}},#{<:#{client_width},90}},#{E:@status-left-termius},#{E:@status-left-default}}"
set -g status-right "#{?pane_in_mode,#{E:@status-copy-badge} ,}#{?client_prefix,#{E:@status-prefix-badge} ,}#{?window_zoomed_flag,#{E:@status-zoom-badge} ,}#[fg=brightblack,bg=default]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-status off
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g pane-border-lines heavy
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=default,fg=default,reverse"
setw -g clock-mode-colour blue
