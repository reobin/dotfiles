# prefix
set -g prefix C-Space
bind C-Space send-prefix
unbind C-b

# reload config
bind e source-file ~/.config/tmux/tmux.conf

# vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# pane controls
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
unbind -T prefix Left
unbind -T prefix Down
unbind -T prefix Up
unbind -T prefix Right
bind x kill-pane
bind o kill-pane -a

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5
bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

# window navigation
bind c new-window -c "#{pane_current_path}"
bind q kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-h select-window -t -1
bind -n M-l select-window -t +1
bind -n M-H swap-window -t -1 \; select-window -t -1
bind -n M-L swap-window -t +1 \; select-window -t +1

# session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind Q kill-session
bind P switch-client -p
bind N switch-client -n
bind -n M-k switch-client -p
bind -n M-j switch-client -n

# resize leader
bind r switch-client -T resize
bind -T resize h resize-pane -L 5
bind -T resize j resize-pane -D 5
bind -T resize k resize-pane -U 5
bind -T resize l resize-pane -R 5

# general
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# session auto naming (full path from lowest-index window)
set-hook -g session-created 'run-shell "~/.config/tmux/tmux-session-name.sh"'
set-hook -g client-attached 'run-shell "~/.config/tmux/tmux-session-name.sh"'
set-hook -g pane-focus-in 'run-shell "~/.config/tmux/tmux-session-name.sh"'
set-hook -g after-new-window 'run-shell "~/.config/tmux/tmux-session-name.sh"'
set-hook -g after-split-window 'run-shell "~/.config/tmux/tmux-session-name.sh"'

# status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 80
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{pane_current_command}'

# theme
set -g mode-style "bg=default,fg=default,reverse"
set -g message-style "fg=#FBFCF6,bg=#1D211A"
set -g message-command-style "fg=#FBFCF6,bg=#1D211A"
set -g pane-border-style "fg=#99A293"
set -g pane-active-border-style "fg=#BCCD80"
set -g status-style "fg=#FBFCF6,bg=#1D211A"
set -g status-left-style "fg=#1D211A,bg=#BCCD80"
set -g status-left " #S "
set -g status-right "#{?client_prefix,#[fg=#1D211A#,bg=#BCCD80#,bold] PREFIX #[default],}#[fg=#99A293] #h "
set -g window-status-style "fg=#99A293,bg=#1D211A"
set -g window-status-current-style "fg=#1D211A,bg=#ECF6AE"
set -g window-status-activity-style "fg=#1D211A,bg=#F7C775"
set -g window-status-bell-style "fg=#1D211A,bg=#EA938B"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g pane-border-status off
set -g pane-border-style "fg=#99A293"
set -g pane-active-border-style "fg=#ECF6AE"
set -g pane-border-lines heavy
setw -g clock-mode-colour "#BCCD80"
